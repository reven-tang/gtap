version: '3.8'

services:
  gtap:
    build:
      context: .
      dockerfile: Dockerfile
    image: gtap:1.0.0
    container_name: gtap-app
    ports:
      - "8501:8501"
    volumes:
      # 挂载数据目录（持久化）
      - ./data:/app/data
      # 挂载配置文件（可选）
      - ./config:/app/config
    environment:
      - PYTHONUNBUFFERED=1
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health')"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
